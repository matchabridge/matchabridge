  <div id="site-header"></div>

    <h1>Wholesale Sign In</h1>
    <p>Approved partners can access pricing, place orders, and request samples here.</p>
  </div>

  <div class="section">
    <div class="auth-wrap">
      <div class="auth-title">Sign in (Coming Soon)</div>

      <form>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="you@cafe.com" disabled>

        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" disabled>
        </div>
        <button type="button" class="form-submit" disabled>Sign in</button>
      </form>

      <p style="font-size: 12px; color: #666; margin-top: 18px;">
        New here? <a href="contact.html#wholesale-inquiry" style="color: #1a1a1a; text-decoration: underline;">Start a wholesale inquiry</a>.
